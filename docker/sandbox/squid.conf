# xFrontier sandbox egress proxy — controls outbound network access for
# sandboxed agent tool execution.
#
# Only allows traffic to explicitly allowlisted domains.  All other
# destinations are denied by default (fail-closed).

http_port 3128

# --- Source ACL: only sandbox containers on the internal network ---
acl sandbox_clients src 172.16.0.0/12
acl sandbox_clients src 192.168.0.0/16
acl sandbox_clients src 10.0.0.0/8

# --- HTTPS tunneling ---
acl CONNECT method CONNECT

# --- Domain allowlist (extend as needed) ---
acl allowed_domains dstdomain .openai.com
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .googleapis.com
acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubusercontent.com
acl allowed_domains dstdomain .pypi.org
acl allowed_domains dstdomain .npmjs.org
acl allowed_domains dstdomain .registry.npmjs.org

# --- Port restrictions ---
acl safe_ports port 443         # HTTPS
acl safe_ports port 80          # HTTP
http_access deny !safe_ports

# --- Access rules (order matters, first match wins) ---
http_access allow sandbox_clients allowed_domains
http_access deny all

# --- Logging ---
cache deny all
access_log stdio:/var/log/squid/access.log combined
cache_log stdio:/var/log/squid/cache.log

# --- Hardening ---
via off
forwarded_for delete
reply_header_access X-Forwarded-For deny all
request_header_access X-Forwarded-For deny all

coredump_dir /var/spool/squid
