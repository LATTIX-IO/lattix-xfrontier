name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci
      - name: Lint
        working-directory: apps/frontend
        run: npm run lint
      - name: Build
        working-directory: apps/frontend
        run: npm run build
      - name: Test
        working-directory: apps/frontend
        run: npm test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy frontier_tooling/ frontier_runtime/
      - name: Policy tests
        run: opa test policies/ -v
      - name: Backend tests
        run: pytest apps/backend/tests tests -v --cov=app --cov=frontier_runtime --cov-report=xml
      - name: Compose config validation
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.local.yml config --quiet
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4.3.0
        with:
          version: v3.17.3
      - name: Helm lint
        run: helm lint ./helm/lattix-frontier
      - name: Helm template validation
        run: helm template lattix ./helm/lattix-frontier -f helm/lattix-frontier/values-prod.yaml > /dev/null
