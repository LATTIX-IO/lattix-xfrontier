services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    depends_on: [backend]
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      API_BASE_URL_INTERNAL: http://backend:8000
      NEXT_PUBLIC_ENABLE_MOCK_DATA: ${NEXT_PUBLIC_ENABLE_MOCK_DATA:-false}
      NEXT_PUBLIC_FRONTIER_ACTOR: ${NEXT_PUBLIC_FRONTIER_ACTOR:-frontend-user}
      NEXT_PUBLIC_FRONTIER_API_TOKEN: ${NEXT_PUBLIC_FRONTIER_API_TOKEN:-}

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: [postgres, redis, neo4j, vault, opa, nats, envoy]
    ports: ["8000:8000"]
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://frontier.localhost}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://lattix:lattix@postgres:5432/lattix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTIER_MEMORY_ENABLE_LONG_TERM: ${FRONTIER_MEMORY_ENABLE_LONG_TERM:-true}
      FRONTIER_MEMORY_LEARNING_ENABLED: ${FRONTIER_MEMORY_LEARNING_ENABLED:-true}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      FRONTIER_AGENT_ASSETS_ROOT: ${FRONTIER_AGENT_ASSETS_ROOT:-/app/examples/agents}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
      OPA_ADDR: http://opa:8181
      NATS_URL: nats://nats:4222
      JAEGER_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      FRONTIER_API_BEARER_TOKEN: ${FRONTIER_API_BEARER_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy-key}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
    volumes:
      - ./:/app
      - ./policies:/app/policies:ro

  local-gateway:
    image: caddy:2.8.4-alpine
    depends_on: [frontend, backend]
    environment:
      LOCAL_STACK_HOST: ${LOCAL_STACK_HOST:-frontier.localhost}
    volumes:
      - ./docker/local/Caddyfile:/etc/caddy/Caddyfile:ro
    ports: ["${LOCAL_GATEWAY_HTTP_PORT:-80}:80"]

  agent-research:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      AGENT_ID: research
      SERVICE_NAME: research
      AGENT_PORT: "8081"
      ORCHESTRATOR_URL: http://backend:8000
      VAULT_ADDR: http://vault:8200
      NATS_URL: nats://nats:4222
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
    ports: ["8081:8081"]

  agent-code:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      AGENT_ID: code
      SERVICE_NAME: code
      AGENT_PORT: "8082"
      ORCHESTRATOR_URL: http://backend:8000
      VAULT_ADDR: http://vault:8200
      NATS_URL: nats://nats:4222
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
    ports: ["8082:8082"]

  agent-review:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      AGENT_ID: review
      SERVICE_NAME: review
      AGENT_PORT: "8083"
      ORCHESTRATOR_URL: http://backend:8000
      VAULT_ADDR: http://vault:8200
      NATS_URL: nats://nats:4222
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
    ports: ["8083:8083"]

  vault:
    image: hashicorp/vault:1.18
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]
    volumes: [vault-data:/vault/file]

  opa:
    image: openpolicyagent/opa:0.68.0-static
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--log-level=info", "/policies"]
    volumes: [./policies:/policies:ro]
    ports: ["8181:8181"]

  envoy:
    image: envoyproxy/envoy:v1.32.4
    volumes: [./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro]
    ports: ["9901:9901", "10000:10000"]
    depends_on: [opa]
    networks:
      - default

  sandbox-egress-gateway:
    image: sameersbn/squid:3.5.27-2
    container_name: frontier-sandbox-egress-gateway
    restart: unless-stopped
    volumes:
      - ./docker/sandbox/squid.conf:/etc/squid/squid.conf:ro
    ports: ["3128:3128"]
    networks:
      sandbox-internal:
        aliases: ["sandbox-egress-gateway"]
      default:
        aliases: ["sandbox-egress-external"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lattix
      POSTGRES_USER: lattix
      POSTGRES_PASSWORD: lattix
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j-data:/data]

  nats:
    image: nats:2.11-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports: ["4222:4222", "8222:8222"]
    volumes: [nats-data:/data]

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686", "4317:4317"]

volumes:
  vault-data:
  postgres-data:
  nats-data:
  neo4j-data:

networks:
  sandbox-internal:
    name: frontier-sandbox-internal
    internal: true
