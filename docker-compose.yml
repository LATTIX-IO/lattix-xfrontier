x-agent-image: &agent-image
  image: ${FRONTIER_AGENT_IMAGE:-lattix-frontier/agent-base:3.12.10-slim-bookworm}
  build:
    context: .
    dockerfile: Dockerfile.agent
    args:
      PYTHON_BASE_IMAGE: ${FRONTIER_AGENT_PYTHON_BASE_IMAGE:-python:3.12.10-slim-bookworm}

x-default-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  frontend:
    <<: *default-logging
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    depends_on: [backend, casdoor]
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      API_BASE_URL_INTERNAL: http://backend:8000
      NEXT_PUBLIC_ENABLE_MOCK_DATA: ${NEXT_PUBLIC_ENABLE_MOCK_DATA:-false}
      NEXT_PUBLIC_FRONTIER_ACTOR: ${NEXT_PUBLIC_FRONTIER_ACTOR:-}
      FRONTIER_AUTH_MODE: ${FRONTIER_AUTH_MODE:-oidc}
      FRONTIER_AUTH_OIDC_PROVIDER: ${FRONTIER_AUTH_OIDC_PROVIDER:-casdoor}
      FRONTIER_AUTH_OIDC_ISSUER: ${FRONTIER_AUTH_OIDC_ISSUER:-http://127.0.0.1:8081}
      FRONTIER_AUTH_OIDC_AUDIENCE: ${FRONTIER_AUTH_OIDC_AUDIENCE:-frontier-ui}
      FRONTIER_AUTH_OIDC_JWKS_URL: ${FRONTIER_AUTH_OIDC_JWKS_URL:-http://127.0.0.1:8081/.well-known/jwks.json}
      FRONTIER_AUTH_OIDC_CLIENT_ID: ${FRONTIER_AUTH_OIDC_CLIENT_ID:-frontier-web}
      FRONTIER_AUTH_OIDC_AUTHORIZATION_URL: ${FRONTIER_AUTH_OIDC_AUTHORIZATION_URL:-http://127.0.0.1:8081/login/oauth/authorize}
      FRONTIER_AUTH_OIDC_TOKEN_URL: ${FRONTIER_AUTH_OIDC_TOKEN_URL:-http://127.0.0.1:8081/api/login/oauth/access_token}
      FRONTIER_AUTH_OIDC_SIGNIN_URL: ${FRONTIER_AUTH_OIDC_SIGNIN_URL:-http://127.0.0.1:8081/login/oauth/authorize}
      FRONTIER_AUTH_OIDC_SIGNUP_URL: ${FRONTIER_AUTH_OIDC_SIGNUP_URL:-http://127.0.0.1:8081/login/oauth/authorize}
      FRONTIER_AUTH_OIDC_SCOPES: ${FRONTIER_AUTH_OIDC_SCOPES:-openid profile email}

  backend:
    <<: *default-logging
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: [postgres, redis, opa, nats, envoy, casdoor]
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://xfrontier.local}
      POSTGRES_DSN: ${POSTGRES_DSN}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTIER_MEMORY_ENABLE_LONG_TERM: ${FRONTIER_MEMORY_ENABLE_LONG_TERM:-true}
      FRONTIER_MEMORY_LEARNING_ENABLED: ${FRONTIER_MEMORY_LEARNING_ENABLED:-true}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      # NVIDIA NIM (hosted API by default; NIM_BASE_URL can target self-hosted
      # NIM microservices to keep inference on-prem).
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NIM_BASE_URL: ${NIM_BASE_URL:-}
      NIM_MODEL: ${NIM_MODEL:-}
      # Local open-weight models served by the ollama sidecar.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Mounted host projects root (see volumes). Working folders are confined
      # under this container path so agents can read/edit the user's repos.
      FRONTIER_PROJECTS_ROOT: ${FRONTIER_PROJECTS_ROOT:-/projects}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      # World-models / knowledge graph live in Postgres (PostgresWorldGraph) — no
      # Neo4j, no JVM. The backend falls through to the relational world-graph when
      # NEO4J_URI is unset. (Set NEO4J_URI explicitly only to opt into legacy Neo4j.)
      FRONTIER_MEMORY_GRAPH_PROJECTION_ENABLED: ${FRONTIER_MEMORY_GRAPH_PROJECTION_ENABLED:-true}
      FRONTIER_AGENT_ASSETS_ROOT: ${FRONTIER_AGENT_ASSETS_ROOT:-/app/examples/agents}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      OPA_ADDR: http://opa:8181
      NATS_URL: nats://nats:4222
      JAEGER_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      FRONTIER_AUTH_MODE: ${FRONTIER_AUTH_MODE:-oidc}
      FRONTIER_AUTH_OIDC_PROVIDER: ${FRONTIER_AUTH_OIDC_PROVIDER:-casdoor}
      FRONTIER_AUTH_OIDC_ISSUER: ${FRONTIER_AUTH_OIDC_ISSUER:-http://127.0.0.1:8081}
      FRONTIER_AUTH_OIDC_AUDIENCE: ${FRONTIER_AUTH_OIDC_AUDIENCE:-frontier-ui}
      FRONTIER_AUTH_OIDC_JWKS_URL: ${FRONTIER_AUTH_OIDC_JWKS_URL:-http://127.0.0.1:8081/.well-known/jwks.json}
      FRONTIER_AUTH_OIDC_CLIENT_ID: ${FRONTIER_AUTH_OIDC_CLIENT_ID:-frontier-web}
      FRONTIER_AUTH_OIDC_AUTHORIZATION_URL: ${FRONTIER_AUTH_OIDC_AUTHORIZATION_URL:-http://127.0.0.1:8081/login/oauth/authorize}
      FRONTIER_AUTH_OIDC_TOKEN_URL: ${FRONTIER_AUTH_OIDC_TOKEN_URL:-http://127.0.0.1:8081/api/login/oauth/access_token}
      FRONTIER_AUTH_OIDC_SIGNIN_URL: ${FRONTIER_AUTH_OIDC_SIGNIN_URL:-http://127.0.0.1:8081/login/oauth/authorize}
      FRONTIER_AUTH_OIDC_SIGNUP_URL: ${FRONTIER_AUTH_OIDC_SIGNUP_URL:-http://127.0.0.1:8081/login/oauth/authorize}
      FRONTIER_AUTH_OIDC_SCOPES: ${FRONTIER_AUTH_OIDC_SCOPES:-openid profile email}
      FRONTIER_BOOTSTRAP_ADMIN_USERNAME: ${FRONTIER_BOOTSTRAP_ADMIN_USERNAME:-frontier-admin}
      FRONTIER_BOOTSTRAP_ADMIN_EMAIL: ${FRONTIER_BOOTSTRAP_ADMIN_EMAIL:-admin@frontier.localhost}
      FRONTIER_BOOTSTRAP_ADMIN_SUBJECT: ${FRONTIER_BOOTSTRAP_ADMIN_SUBJECT:-frontier-admin}
      FRONTIER_ADMIN_ACTORS: ${FRONTIER_ADMIN_ACTORS:-frontier-admin,admin@frontier.localhost}
      FRONTIER_BUILDER_ACTORS: ${FRONTIER_BUILDER_ACTORS:-frontier-admin,admin@frontier.localhost}
      FRONTIER_API_BEARER_TOKEN: ${FRONTIER_API_BEARER_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy-key}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
    volumes:
      - ./:/app
      - ./policies:/app/policies:ro
      # Host projects root → /projects. Point FRONTIER_PROJECTS_HOST at the
      # folder that contains the repos you want the agents to work in.
      - ${FRONTIER_PROJECTS_HOST:-D:/lattix}:/projects

  local-gateway:
    <<: *default-logging
    image: caddy:2.8.4-alpine
    depends_on: [frontend, backend, casdoor]
    environment:
      LOCAL_STACK_HOST: ${LOCAL_STACK_HOST:-xfrontier.local}
      CASDOOR_LOCAL_HOST: ${CASDOOR_LOCAL_HOST:-casdoor.localhost}
    volumes:
      - ./docker/local/Caddyfile:/etc/caddy/Caddyfile:ro
    # Bind BOTH IPv4 and IPv6 loopback: browsers resolve *.localhost to ::1
    # first, so an IPv4-only bind makes the UI fail with "Failed to fetch".
    ports:
      - "${LOCAL_GATEWAY_BIND_HOST:-127.0.0.1}:${LOCAL_GATEWAY_HTTP_PORT:-80}:80"
      - "[::1]:${LOCAL_GATEWAY_HTTP_PORT:-80}:80"

  casdoor:
    <<: *default-logging
    image: casbin/casdoor-all-in-one:v1.765.0
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "tr -d '\\r' < /docker/casdoor/start-casdoor.sh > /tmp/start-casdoor.sh && chmod +x /tmp/start-casdoor.sh && exec /bin/bash /tmp/start-casdoor.sh",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUNNING_IN_DOCKER: "true"
      CASDOOR_PUBLIC_URL: ${CASDOOR_PUBLIC_URL:-http://127.0.0.1:8081}
      CASDOOR_BOOTSTRAP_ADMIN_USERNAME: ${CASDOOR_BOOTSTRAP_ADMIN_USERNAME:-frontier-admin}
      CASDOOR_BOOTSTRAP_ADMIN_EMAIL: ${CASDOOR_BOOTSTRAP_ADMIN_EMAIL:-admin@frontier.localhost}
      CASDOOR_POSTGRES_HOST: ${CASDOOR_POSTGRES_HOST:-postgres}
      CASDOOR_POSTGRES_PORT: ${CASDOOR_POSTGRES_PORT:-5432}
      CASDOOR_POSTGRES_USER: ${CASDOOR_POSTGRES_USER:-${POSTGRES_USER:-frontier}}
      CASDOOR_POSTGRES_PASSWORD: ${CASDOOR_POSTGRES_PASSWORD:-${POSTGRES_PASSWORD}}
      CASDOOR_POSTGRES_DB: ${CASDOOR_POSTGRES_DB:-${POSTGRES_DB:-frontier}}
    ports: ["${CASDOOR_BIND_HOST:-127.0.0.1}:${CASDOOR_HTTP_PORT:-8081}:8000"]
    volumes:
      - ./docker/casdoor/start-casdoor.sh:/docker/casdoor/start-casdoor.sh:ro

  agent-research:
    <<: *agent-image
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      AGENT_ID: research
      SERVICE_NAME: research
      AGENT_PORT: "8081"
      ORCHESTRATOR_URL: http://backend:8000
      VAULT_ADDR: http://vault:8200
      NATS_URL: nats://nats:4222
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
      FRONTIER_PROJECTS_ROOT: ${FRONTIER_PROJECTS_ROOT:-/projects}
    volumes:
      - ${FRONTIER_PROJECTS_HOST:-D:/lattix}:/projects

  agent-code:
    <<: *agent-image
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      AGENT_ID: code
      SERVICE_NAME: code
      AGENT_PORT: "8082"
      ORCHESTRATOR_URL: http://backend:8000
      VAULT_ADDR: http://vault:8200
      NATS_URL: nats://nats:4222
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
      FRONTIER_PROJECTS_ROOT: ${FRONTIER_PROJECTS_ROOT:-/projects}
    volumes:
      - ${FRONTIER_PROJECTS_HOST:-D:/lattix}:/projects

  agent-review:
    <<: *agent-image
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      AGENT_ID: review
      SERVICE_NAME: review
      AGENT_PORT: "8083"
      ORCHESTRATOR_URL: http://backend:8000
      VAULT_ADDR: http://vault:8200
      NATS_URL: nats://nats:4222
      FRONTIER_RUNTIME_PROFILE: ${FRONTIER_RUNTIME_PROFILE:-local-secure}
      A2A_JWT_ALG: ${A2A_JWT_ALG:-HS256}
      A2A_JWT_ISS: ${A2A_JWT_ISS:-lattix-frontier}
      A2A_JWT_AUD: ${A2A_JWT_AUD:-frontier-runtime}
      A2A_JWT_SECRET: ${A2A_JWT_SECRET}
      A2A_REQUIRE_NONCE: ${A2A_REQUIRE_NONCE:-true}
      A2A_REPLAY_PROTECTION: ${A2A_REPLAY_PROTECTION:-true}
      A2A_CLOCK_SKEW_SECONDS: ${A2A_CLOCK_SKEW_SECONDS:-30}
      A2A_REPLAY_TTL_SECONDS: ${A2A_REPLAY_TTL_SECONDS:-900}
      A2A_TRUSTED_SUBJECTS: ${A2A_TRUSTED_SUBJECTS:-backend,research,code,review,coordinator}
      FRONTIER_PROJECTS_ROOT: ${FRONTIER_PROJECTS_ROOT:-/projects}
    volumes:
      - ${FRONTIER_PROJECTS_HOST:-D:/lattix}:/projects
  vault:
    <<: *default-logging
    image: hashicorp/vault:1.18
    command: ["server"]
    cap_add: [IPC_LOCK]
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - vault-data:/vault/file
      - ./docker/vault/vault.hcl:/vault/config/vault.hcl:ro

  opa:
    <<: *default-logging
    image: openpolicyagent/opa:0.68.0-static
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--log-level=info", "/policies"]
    volumes: [./policies:/policies:ro]

  envoy:
    <<: *default-logging
    image: envoyproxy/envoy:v1.32.4
    volumes: [./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro]
    depends_on: [opa]
    networks:
      - default

  sandbox-egress-gateway:
    <<: *default-logging
    image: sameersbn/squid:3.5.27-2
    restart: unless-stopped
    volumes:
      - ./docker/sandbox/squid.conf:/etc/squid/squid.conf:ro
    networks:
      sandbox-internal:
        aliases: ["sandbox-egress-gateway"]
      default:
        aliases: ["sandbox-egress-external"]

  postgres:
    <<: *default-logging
    # pgvector image (PG16) so the long-term memory / knowledge store can use
    # vector similarity search. Volume-compatible with plain postgres:16.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frontier}
      POSTGRES_USER: ${POSTGRES_USER:-frontier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frontier} -d ${POSTGRES_DB:-frontier}"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes: [postgres-data:/var/lib/postgresql/data]

  redis:
    <<: *default-logging
    image: redis:7-alpine

  nats:
    <<: *default-logging
    image: nats:2.11-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    volumes: [nats-data:/data]

  jaeger:
    <<: *default-logging
    image: jaegertracing/all-in-one:1.61.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["127.0.0.1:16686:16686"]

  # Local open-weight model runtime (download + serve via OpenAI-compatible
  # API). Idles small; memory is consumed only while a model is loaded.
  ollama:
    <<: *default-logging
    image: ollama/ollama:latest
    # gpt-oss:20b (MXFP4, ~13GB) needs headroom for the KV cache and any layers
    # that spill past VRAM. 16g is a safe floor on a 32GB host.
    mem_limit: 16g
    environment:
      # keep the model resident between agent calls / runs so each turn isn't a
      # cold reload from disk.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    volumes:
      - ollama-models:/root/.ollama
    # GPU passthrough — host has an NVIDIA GPU and the nvidia container runtime.
    # gpt-oss:20b (~13GB) is larger than 12GB VRAM, so Ollama keeps most layers
    # on the GPU and offloads the rest to CPU/RAM automatically. Comment this
    # block out (and the model runs CPU-only) on a host without an NVIDIA GPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # One-shot: pull the local model into the ollama sidecar on `make up` so the
  # platform self-provisions gpt-oss:20b instead of relying on a manual pull.
  # Idempotent — a no-op once the model is in the ollama-models volume.
  ollama-init:
    <<: *default-logging
    image: ollama/ollama:latest
    depends_on: [ollama]
    environment:
      OLLAMA_HOST: http://ollama:11434
      FRONTIER_OLLAMA_MODEL: ${FRONTIER_OLLAMA_MODEL:-gpt-oss:20b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "waiting for ollama sidecar..."; \
        until ollama list >/dev/null 2>&1; do sleep 2; done; \
        echo "pulling $${FRONTIER_OLLAMA_MODEL} ..."; \
        ollama pull "$${FRONTIER_OLLAMA_MODEL}" && echo "gpt-oss model ready."
    restart: "no"

volumes:
  vault-data:
  postgres-data:
  nats-data:
  ollama-models:

networks:
  sandbox-internal:
    internal: true
