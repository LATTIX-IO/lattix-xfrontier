apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lattix-opa-reader
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lattix-opa-reader
subjects:
  - kind: ServiceAccount
    name: lattix-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lattix-opa-reader
