apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lattix-frontier.fullname" . }}-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lattix-api
  template:
    metadata:
      labels:
        app: lattix-api
    spec:
      securityContext:
{{ toYaml .Values.security.podSecurityContext | indent 8 }}
      containers:
        - name: api
          image: {{ include "lattix-frontier.imageRef" .Values.orchestrator.image }}
          securityContext:
{{ toYaml .Values.security.containerSecurityContext | indent 12 }}
          ports:
            - containerPort: 8000
          env:
            - name: FRONTIER_RUNTIME_PROFILE
              value: {{ .Values.runtime.profile | quote }}
            - name: FRONTIER_REQUIRE_A2A_RUNTIME_HEADERS
              value: {{ .Values.runtime.requireA2ARuntimeHeaders | quote }}
            - name: A2A_JWT_ALG
              value: {{ .Values.runtime.a2a.jwtAlgorithm | quote }}
            - name: A2A_JWT_ISS
              value: {{ .Values.runtime.a2a.jwtIssuer | quote }}
            - name: A2A_JWT_AUD
              value: {{ .Values.runtime.a2a.jwtAudience | quote }}
            - name: A2A_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtime.a2a.sharedSecretName }}
                  key: {{ .Values.runtime.a2a.sharedSecretKey }}
