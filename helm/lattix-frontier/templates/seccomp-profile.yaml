{{- if .Values.sandbox.enabled }}
---
# Seccomp profile ConfigMap — deployed to nodes via a DaemonSet or node
# provisioning.  The profile blocks dangerous syscalls (ptrace, io_uring,
# mount, bpf, etc.) matching the restrictions in Codex's kernel sandbox.
#
# Nodes must have the seccomp profile at:
#   /var/lib/kubelet/seccomp/profiles/frontier-strict.json
#
# This ConfigMap stores the canonical profile; a DaemonSet or init container
# copies it to the kubelet path.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lattix-frontier.fullname" . }}-seccomp
  labels:
    {{- include "lattix-frontier.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox
data:
  frontier-strict.json: |
    {
      "defaultAction": "SCMP_ACT_ALLOW",
      "syscalls": [
        {
          "names": ["ptrace","process_vm_readv","process_vm_writev","kcmp","io_uring_setup","io_uring_enter","io_uring_register"],
          "action": "SCMP_ACT_ERRNO",
          "errnoRet": 1
        },
        {
          "names": ["init_module","finit_module","delete_module","kexec_load","kexec_file_load","reboot","swapon","swapoff","acct","settimeofday","stime","adjtimex","clock_adjtime","clock_settime"],
          "action": "SCMP_ACT_ERRNO",
          "errnoRet": 1
        },
        {
          "names": ["mount","umount2","pivot_root","unshare","setns"],
          "action": "SCMP_ACT_ERRNO",
          "errnoRet": 1
        },
        {
          "names": ["keyctl","request_key","add_key"],
          "action": "SCMP_ACT_ERRNO",
          "errnoRet": 1
        },
        {
          "names": ["bpf","perf_event_open"],
          "action": "SCMP_ACT_ERRNO",
          "errnoRet": 1
        },
        {
          "names": ["setuid","setgid","setreuid","setregid","setresuid","setresgid","setgroups","setfsgid","setfsuid"],
          "action": "SCMP_ACT_ERRNO",
          "errnoRet": 1
        },
        {
          "names": ["personality","open_by_handle_at","name_to_handle_at","lookup_dcookie","quotactl"],
          "action": "SCMP_ACT_ERRNO",
          "errnoRet": 1
        }
      ]
    }
{{- end }}
