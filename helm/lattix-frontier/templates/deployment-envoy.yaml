apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lattix-frontier.fullname" . }}-envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lattix-envoy
  template:
    metadata:
      labels:
        app: lattix-envoy
    spec:
      securityContext:
{{ toYaml .Values.security.podSecurityContext | indent 8 }}
      containers:
        - name: envoy
          image: {{ include "lattix-frontier.imageRef" .Values.vendorImages.envoy }}
          securityContext:
{{ toYaml .Values.security.containerSecurityContext | indent 12 }}
