apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lattix-frontier.fullname" . }}-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lattix-vault
  template:
    metadata:
      labels:
        app: lattix-vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.18
