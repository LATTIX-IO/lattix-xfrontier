apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lattix-frontier.fullname" . }}-nats
spec:
  serviceName: {{ include "lattix-frontier.fullname" . }}-nats
  selector:
    matchLabels:
      app: lattix-nats
  template:
    metadata:
      labels:
        app: lattix-nats
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: {{ include "lattix-frontier.imageRef" .Values.nats.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
