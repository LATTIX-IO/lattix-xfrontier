apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lattix-frontier.fullname" . }}-orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app: lattix-orchestrator
  template:
    metadata:
      labels:
        app: lattix-orchestrator
    spec:
      serviceAccountName: lattix-orchestrator
      securityContext:
{{ toYaml .Values.security.podSecurityContext | indent 8 }}
      containers:
        - name: orchestrator
          image: {{ include "lattix-frontier.imageRef" .Values.orchestrator.image }}
          securityContext:
{{ toYaml .Values.security.containerSecurityContext | indent 12 }}
          ports:
            - containerPort: 8000
          env:
            - name: FRONTIER_RUNTIME_PROFILE
              value: {{ .Values.runtime.profile | quote }}
            - name: FRONTIER_REQUIRE_A2A_RUNTIME_HEADERS
              value: {{ .Values.runtime.requireA2ARuntimeHeaders | quote }}
            - name: A2A_JWT_ALG
              value: {{ .Values.runtime.a2a.jwtAlgorithm | quote }}
            - name: A2A_JWT_ISS
              value: {{ .Values.runtime.a2a.jwtIssuer | quote }}
            - name: A2A_JWT_AUD
              value: {{ .Values.runtime.a2a.jwtAudience | quote }}
            - name: A2A_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtime.a2a.sharedSecretName }}
                  key: {{ .Values.runtime.a2a.sharedSecretKey }}
            - name: FEDERATION_ENABLED
              value: {{ .Values.federation.enabled | quote }}
            - name: FEDERATION_CLUSTER_NAME
              value: {{ .Values.federation.clusterName | quote }}
            - name: FEDERATION_REGION
              value: {{ .Values.federation.region | quote }}
            - name: FEDERATION_PEER_ENDPOINTS
              value: {{ join "," .Values.federation.peers | quote }}
