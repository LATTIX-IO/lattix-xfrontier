apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lattix-frontier.fullname" . }}-postgres
spec:
  serviceName: {{ include "lattix-frontier.fullname" . }}-postgres
  selector:
    matchLabels:
      app: lattix-postgres
  template:
    metadata:
      labels:
        app: lattix-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ include "lattix-frontier.imageRef" .Values.postgres.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
