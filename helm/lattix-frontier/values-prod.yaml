runtime:
  profile: hosted
  requireA2ARuntimeHeaders: true

orchestrator:
  replicaCount: 2
  resources:
    requests: { cpu: "1", memory: 1Gi }
    limits: { cpu: "4", memory: 4Gi }
vault:
  dev: false
networkPolicies:
  enabled: true
ingress:
  enabled: true
  tls:
    enabled: true
    secretName: lattix-frontier-tls
federation:
  enabled: false
  clusterName: frontier-prod
  region: us-east
